services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dssi_phishing_awareness}
      POSTGRES_USER: ${POSTGRES_USER:-dssi_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dssi_app} -d ${POSTGRES_DB:-dssi_phishing_awareness}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dssi_phishing_awareness}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dssi_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost:4200}
      APP_INTERNAL_EMAIL_DOMAINS: ${APP_INTERNAL_EMAIL_DOMAINS:-example.internal}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:4200}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-4200}:80"

  backend-test:
    image: maven:3.9.11-eclipse-temurin-21
    working_dir: /workspace
    command: mvn test
    volumes:
      - ./backend:/workspace
      - maven-cache:/root/.m2
    profiles: ["test"]

  frontend-test:
    build:
      context: ./frontend
      target: test
    command: npm test
    profiles: ["test"]

volumes:
  postgres-18-data:
  maven-cache:
